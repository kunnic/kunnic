name: Update GitHub Profile Stats

on:
  schedule:
    - cron: '0 0 * * *' # Chạy tự động vào 12h đêm mỗi ngày
  workflow_dispatch: # Cho phép bạn bấm nút chạy thủ công bất cứ lúc nào

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install Pillow numpy lxml

      - name: Run Script
        run: python today.py
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }} 

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg
          git commit -m "Update profile stats and ASCII portrait" || exit 0
          git push